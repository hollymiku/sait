<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информационный сайт</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 2px solid #ff4a4a;
            border-radius: 15px;
            background-color: #262626;
            box-shadow: 0 0 20px rgba(255, 74, 74, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            color: #ff4a4a;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ваня лошара дырявая</h1>
    </div>

</body>
</html>
